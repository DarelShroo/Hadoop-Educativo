version: '3.8'

services:
  hadoop-pig:
    build:
      context: .
      dockerfile: Dockerfile
    image: pig-latin-educativo:latest
    container_name: hadoop-pig-executor
    hostname: hadoop-pig-executor
    networks:
      - pig-network
    ports:
      - "9870:9870" # NameNode Web UI
      - "8088:8088" # ResourceManager Web UI
    volumes:
      - ../datasets:/datasets:ro
      - ../exercises:/exercises:ro
      - ./scripts:/scripts:rw
    environment:
      - HADOOP_USER_NAME=hadoop
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    command: tail -f /dev/null
    healthcheck:
      test: [ "CMD", "pig", "-version" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  pig-network:
    driver: bridge
