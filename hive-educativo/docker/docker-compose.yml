version: '3.8'

services:
  hive:
    build:
      context: .
      dockerfile: Dockerfile
    image: hive-educativo:latest
    container_name: hive-executor
    hostname: hive-executor
    networks:
      - hive-network
    volumes:
      - ./scripts:/scripts
      - ../datasets:/datasets:ro
    ports:
      - "10000:10000" # HiveServer2
      - "10002:10002" # Hive Web UI
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    command: tail -f /dev/null
    healthcheck:
      test: [ "CMD", "hive", "--version" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    build:
      context: ..
      dockerfile: Dockerfile.web
    container_name: hive-web
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/app/docker/scripts:rw
      - ../server:/app/server:rw
      - ../public:/app/public:rw
    environment:
      - PORT=3001
      - DOCKER_CONTAINER_NAME=hive-executor
    networks:
      - hive-network
    depends_on:
      hive:
        condition: service_healthy

networks:
  hive-network:
    driver: bridge
